<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老蔡的作品展示</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><img src="logo.png" alt="logo" class="site-logo"> 老蔡的作品展示</h1>

        <!-- 独立的搜索区域 -->
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索文件名...">
                <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i> 搜索</button>
            </div>
        </div>

        <!-- 文件列表区域 -->
        <section class="section file-section">
            <div class="file-list-header">
                <span class="col-check"><input type="checkbox" id="selectAll"></span>
                <span class="col-order">序号</span>
                <span class="col-thumb">缩略图</span>
                <span class="col-name">文件名</span>
                <span class="col-type">类型</span>
                <span class="col-size">大小</span>
                <span class="col-date">时间</span>
                <span class="col-action">操作</span>
            </div>
            <div class="file-list" id="fileList">
                <div class="empty-list">暂无文件，请上传</div>
            </div>
            <div class="file-list-footer" id="fileListFooter">
                <div class="footer-actions">
                    <span class="select-all-label"><input type="checkbox" id="selectAllFooter"><span>全选</span></span>
                    <button class="btn-batch-download"><i class="fas fa-download"></i> 批量下载</button>
                    <button class="btn-batch-delete"><i class="fas fa-trash-alt"></i> 批量删除</button>
                </div>
                <div class="footer-center">
                    <span class="footer-file-count" id="footerFileCount"></span>
                    <div class="pagination">
                        <span class="page-label">每页</span>
                        <input type="number" id="pageSizeInput" value="10" min="1" max="10" class="page-size-input">
                        <span class="page-label">个</span>
                        <button class="btn-page btn-page-nav" id="prevPage"><i class="fas fa-chevron-left"></i></button>
                        <span class="page-info" id="pageInfo">1 / 1</span>
                        <button class="btn-page btn-page-nav" id="nextPage"><i class="fas fa-chevron-right"></i></button>
                        <input type="number" id="pageInput" class="page-jump-input" placeholder="跳转">
                        <button class="btn-page" id="jumpBtn">跳转</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 上传区域 -->
        <section class="section upload-section">
            <h2><i class="fas fa-cloud-upload-alt"></i> 上传文件</h2>
            <div class="upload-zone" id="uploadZone">
                <i class="fas fa-upload"></i>
                <p>点击选择文件 或 拖拽文件到此处</p>
                <input type="file" id="fileInput" multiple accept="image/*,video/*">
            </div>
            <div class="storage-bar" id="storageBar">
                <div class="storage-bar-label">
                    <span>存储空间</span>
                    <span id="storageText">计算中...</span>
                </div>
                <div class="storage-bar-track">
                    <div class="storage-bar-fill" id="storageFill" style="width: 0%"></div>
                </div>
            </div>
        </section>
    </div>

    <div class="preview-modal" id="previewModal">
        <span class="close-preview">&times;</span>
        <img class="preview-image" id="previewImage" src="" alt="预览">
    </div>

    <footer class="version-footer">
        <span id="versionNum" data-version="v1.0.0040"></span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
