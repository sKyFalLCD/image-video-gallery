<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sKyCai的作品展示</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-palette"></i> sKyCai的作品展示</h1>
            <p class="subtitle">个人创作图片与视频展示平台</p>
        </header>

        <!-- 文件列表区域 -->
        <section class="section">
            <h2><i class="fas fa-list"></i> 文件列表</h2>
            <div class="file-list-header">
                <span>缩略图</span>
                <span>文件名</span>
                <span>类型</span>
                <span>大小</span>
                <span>上传日期</span>
                <span>操作</span>
            </div>
            <div class="file-list" id="fileList">
                <div class="empty-list">暂无文件，请上传</div>
            </div>
        </section>

        <!-- 上传区域 -->
        <section class="section">
            <h2><i class="fas fa-cloud-upload-alt"></i> 上传文件</h2>
            <div class="upload-zone" id="uploadZone">
                <i class="fas fa-upload"></i>
                <p>点击选择文件 或 拖拽文件到此处</p>
                <input type="file" id="fileInput" multiple accept="image/*,video/*">
            </div>
        </section>

        <footer class="footer">
            <p>sKyCai的作品展示 &copy; 2026</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
