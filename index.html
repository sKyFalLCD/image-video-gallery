<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老蔡的作品展示</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><img src="logo.png" alt="logo" class="site-logo"> 老蔡的作品展示</h1>

        <section class="section">
            <div class="section-header">
                <h2><i class="fas fa-list"></i> 文件列表 <span id="fileCountHeader" class="file-count-header"></span></h2>
                <div class="header-right">
                    <input type="text" id="searchInput" class="search-input" placeholder="搜索文件名..."><button id="searchBtn" class="search-btn"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div class="file-list-header">
                <span class="col-check"><input type="checkbox" id="selectAll"></span>
                <span class="col-order">序号<button class="sort-btn active" data-sort="order" title="按序号排序"><i class="fas fa-sort"></i></button></span>
                <span class="col-thumb">缩略图</span>
                <span class="col-name">文件名</span>
                <span class="col-filter"><select class="filter-select" id="filterSelect"><option value="all">类型</option><option value="image">图片</option><option value="video">视频</option></select></span>
                <span class="col-size"><button class="sort-btn" data-sort="size" title="按大小排序">大小<i class="fas fa-sort"></i></button></span>
                <span class="col-date"><button class="sort-btn" data-sort="date" title="按时间排序">时间<i class="fas fa-sort"></i></button></span>
                <span class="col-action">操作</span>
            </div>
            <div class="file-list" id="fileList">
                <div class="empty-list">暂无文件，请上传</div>
            </div>
        </section>

        <section class="section upload-section">
            <h2><i class="fas fa-cloud-upload-alt"></i> 上传文件</h2>
            <div class="upload-zone" id="uploadZone">
                <i class="fas fa-upload"></i>
                <p>点击选择文件 或 拖拽文件到此处</p>
                <input type="file" id="fileInput" multiple accept="image/*,video/*">
            </div>
            <div class="storage-bar" id="storageBar">
                <div class="storage-bar-label">
                    <span>存储空间</span>
                    <span id="storageText">计算中...</span>
                </div>
                <div class="storage-bar-track">
                    <div class="storage-bar-fill" id="storageFill" style="width: 0%"></div>
                </div>
            </div>
        </section>
    </div>

    <div class="preview-modal" id="previewModal">
        <span class="close-preview">&times;</span>
        <img class="preview-image" id="previewImage" src="" alt="预览">
    </div>

    <footer class="version-footer">
        <span id="versionNum" data-version="v1.0.0031"></span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
